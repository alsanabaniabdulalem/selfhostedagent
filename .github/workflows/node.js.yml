name: React CI/CD (Self-Hosted)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: react-selfhosted-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests (non-interactive)
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx gh-pages -d build \
            -u "github-actions-bot <support+actions@github.com>" \
            -r "https://x-access-token:${DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          DEPLOY_TOKEN: ${{ secrets.GH_PAGES_PAT || secrets.GITHUB_TOKEN }}
